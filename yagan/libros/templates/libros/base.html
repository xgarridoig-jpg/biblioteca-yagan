{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Yagan | Colección Austral</title>
    
    <!-- Google Fonts: Playfair Display (Titulos) y Lato (Texto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'libros/css/estilos.css' %}">
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <h1 class="header-title">Biblioteca Yagan</h1>
    </div>
</header>

<main class="main-content">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<footer class="main-footer">
    <p>© 2026 — <strong>Biblioteca Yagan</strong>. Desarrollado por Ximena Garrido.</p>
</footer>

</body>
</html>
